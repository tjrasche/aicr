# Validates Fern docs configuration on pull requests that touch docs or fern/.

name: Fern Docs CI

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'fern/**'
      - '.github/workflows/fern-docs-ci.yaml'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  fern-check:
    name: Fern Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'

      - name: Install Fern CLI
        run: npm install -g fern-api@$(jq -r .version fern/fern.config.json)

      - name: Check MDX safety
        run: ./tools/check-docs-mdx

      - name: Fern check
        run: fern check

      - name: Check links
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          args: --offline --no-progress 'docs/**/*.md'
          fail: true
