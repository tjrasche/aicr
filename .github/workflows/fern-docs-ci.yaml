# Validates Fern docs configuration on pull requests that touch docs or fern/.

name: Fern Docs CI

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'fern/**'
      - '.github/workflows/fern-docs-ci.yaml'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  fern-check:
    name: Fern Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install Fern CLI
        run: npm install -g fern-api@$(jq -r .version fern/fern.config.json)

      - name: Check MDX safety
        run: ./tools/check-docs-mdx

      - name: Fern check
        run: fern check

      - name: Check links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --offline --no-progress 'docs/**/*.md'
          fail: true
