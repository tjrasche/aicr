name: On Tag Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'  # Semantic versioning with optional pre-release suffix (e.g., v1.2.3-rc1)

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  VALIDATOR_IMAGE_PREFIX: ghcr.io/nvidia/aicr-validators
  # Keep in sync with build-docker matrix.phase. `aiperf-bench` is an ancillary
  # benchmark runner image (not a Go validator binary) used by the
  # inference-perf check.
  VALIDATOR_PHASES: "deployment performance conformance aiperf-bench"
  # Readiness-gate image (gate CLI + embedded chainsaw). Built like a validator
  # — native per-arch Dockerfile build, multi-arch manifest, scan, attest — but
  # under its own repo path, not aicr-validators/. See #904.
  GATE_IMAGE: ghcr.io/nvidia/aicr-gate
  EXPECTED_PLATFORMS: "linux/amd64 linux/arm64"

jobs:

  # =============================================================================
  # Detect: Determine if this is a pre-release tag
  # =============================================================================

  detect:
    name: Detect Release Type
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      contents: read
    outputs:
      is_prerelease: ${{ steps.check.outputs.is_prerelease }}
      candidate_tag: ${{ steps.check.outputs.candidate_tag }}
    steps:
      - name: Check tag for pre-release suffix
        id: check
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          SEMVER_TAG_PATTERN='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*))*))?$'
          if [[ ! "${TAG}" =~ ${SEMVER_TAG_PATTERN} ]]; then
            echo "::error::release tag is not valid SemVer: ${TAG}"
            exit 1
          fi
          CANDIDATE_TAG="candidate-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          if [[ ! "${CANDIDATE_TAG}" =~ ^candidate-[0-9]+-[0-9]+$ ]]; then
            echo "::error::generated candidate tag is invalid"
            exit 1
          fi
          echo "candidate_tag=${CANDIDATE_TAG}" >> "$GITHUB_OUTPUT"
          if [[ "${TAG}" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Pre-release detected: ${TAG}"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Stable release: ${TAG}"
          fi

  # =============================================================================
  # Test Jobs (reusable workflow — same suite as on-push.yaml)
  # =============================================================================

  tests:
    uses: ./.github/workflows/qualification.yaml
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write

  # =============================================================================
  # Build Job: GoReleaser (binaries, ko images, draft GitHub release)
  # =============================================================================

  build-ko:
    name: Build and Release (Draft)
    runs-on: ubuntu-latest
    needs: [detect, tests]
    timeout-minutes: 30
    outputs:
      homebrew_artifact_name: ${{ steps.homebrew-artifact.outputs.name }}
    permissions:
      actions: read
      contents: write
      packages: write
      id-token: write
      security-events: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0  # Full history for changelog generation
          persist-credentials: false

      - name: Load versions
        id: versions
        uses: ./.github/actions/load-versions

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version: ${{ steps.versions.outputs.go }}
          cache: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2
        with:
          # Pin from .settings.yaml (>= v3.1.0) so cosign logs DSSE attestations
          # to Rekor v2 as hashedrekord/PAE. The installer default (v3.0.6) writes
          # the legacy dsse entry type, which sigstore-go cannot verify. See #1650.
          cosign-release: ${{ steps.versions.outputs.cosign }}

      - name: Generate SLSA predicate
        uses: ./.github/actions/generate-slsa-predicate
        with:
          workflow_file: on-tag.yaml

      - name: Build and Release
        id: release
        uses: ./.github/actions/go-build-release
        with:
          ko_version: ${{ steps.versions.outputs.ko }}
          goreleaser_version: ${{ steps.versions.outputs.goreleaser }}
          go_licenses_version: ${{ steps.versions.outputs.go_licenses }}
          candidate_tag: ${{ needs.detect.outputs.candidate_tag }}

      - name: Malware Scan Release Binaries
        if: steps.release.outcome == 'success'
        uses: ./.github/actions/malware-scan
        with:
          scan_path: dist/
          category: 'clamav-release-binaries'

      # Inline by design: these single-use steps bridge GoReleaser's local
      # formula into a rerun-safe artifact for the post-publication job.
      - name: Name Homebrew artifact
        id: homebrew-artifact
        if: steps.release.outcome == 'success' && needs.detect.outputs.is_prerelease == 'false'
        shell: bash
        env:
          CANDIDATE_TAG: ${{ needs.detect.outputs.candidate_tag }}
        run: |
          set -euo pipefail
          if [[ ! "${CANDIDATE_TAG}" =~ ^candidate-[0-9]+-[0-9]+$ || \
            ! "${GITHUB_RUN_ATTEMPT}" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::invalid Homebrew artifact identity"
            exit 1
          fi
          echo "name=aicr-homebrew-formula-${CANDIDATE_TAG}-attempt-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Stage Homebrew formula
        if: steps.release.outcome == 'success' && needs.detect.outputs.is_prerelease == 'false'
        shell: bash
        run: |
          set -euo pipefail
          formula="$(jq -er \
            '[.[] | select(.type == "Homebrew Formula")] |
             if length == 1 then .[0].path else error("expected exactly one Homebrew Formula artifact") end' \
            dist/artifacts.json)"
          if [[ "${formula}" == *$'\n'* || "${formula}" == *$'\r'* || ! -f "${formula}" || -L "${formula}" ]]; then
            echo "::error::Homebrew formula artifact path is malformed"
            exit 1
          fi
          formula_path="$(realpath -e -- "${formula}")"
          dist_path="$(realpath -e -- dist)"
          case "${formula_path}" in
            "${dist_path}"/*) ;;
            *)
              echo "::error::refusing Homebrew formula outside dist"
              exit 1
              ;;
          esac
          install -m 0600 "${formula_path}" /tmp/aicr.rb

      - name: Upload Homebrew formula
        if: steps.release.outcome == 'success' && needs.detect.outputs.is_prerelease == 'false'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ steps.homebrew-artifact.outputs.name }}
          path: /tmp/aicr.rb
          if-no-files-found: error
          # GitHub permits rerunning a workflow for 30 days. Keep the only
          # generated formula available for that full recovery window.
          retention-days: 30

  # =============================================================================
  # Docker Jobs: Native per-arch validator builds (parallel with GoReleaser)
  # =============================================================================

  build-docker:
    name: Docker Validator (${{ matrix.phase }}/${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [detect, tests]
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        phase: [deployment, performance, conformance, aiperf-bench]  # keep in sync with VALIDATOR_PHASES
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
          # Ancillary (non-Go-validator) images override the default
          # validators/<phase>/Dockerfile path and image title.
          - phase: aiperf-bench
            dockerfile: validators/performance/aiperf-bench.Dockerfile
            image_title: aicr-aiperf-bench
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: Authenticate to registry
        uses: ./.github/actions/ghcr-login

      - name: Read Go version
        id: go
        shell: bash
        run: echo "version=$(cat .go-version)" >> "$GITHUB_OUTPUT"

      - name: Load versions
        id: versions
        uses: ./.github/actions/load-versions

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          file: ${{ matrix.dockerfile || format('validators/{0}/Dockerfile', matrix.phase) }}
          platforms: ${{ matrix.platform }}
          push: true
          # CHAINSAW_* args were dropped in #1236 — the deployment validator
          # no longer ships /usr/local/bin/chainsaw; it executes Chainsaw
          # Test format in-process via validators/chainsaw/inprocess.go.
          # (The separate build-gate job below still passes CHAINSAW_VERSION
          # because the gate CLI image embeds chainsaw for its own use.)
          build-args: |
            GO_VERSION=${{ steps.go.outputs.version }}
          tags: ${{ env.VALIDATOR_IMAGE_PREFIX }}/${{ matrix.phase }}:${{ needs.detect.outputs.candidate_tag }}-${{ matrix.arch }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.title=${{ matrix.image_title || format('aicr-validator-{0}', matrix.phase) }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  # =============================================================================
  # Gate Job: native per-arch readiness-gate image (gate CLI + embedded chainsaw)
  # =============================================================================

  build-gate:
    name: Docker Gate (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [detect, tests]
    timeout-minutes: 15
    # contents: read to checkout the source for the docker build; packages:
    # write to push the per-arch aicr-gate image to GHCR (ghcr.io/nvidia/aicr-gate).
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: Authenticate to registry
        uses: ./.github/actions/ghcr-login

      # Go version and the chainsaw tag both come from the repo's single source
      # of truth (.go-version / .settings.yaml) so the in-cluster gate runs the
      # same chainsaw AICR validates with.
      - name: Load versions
        id: versions
        uses: ./.github/actions/load-versions

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          file: cmd/gate/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            GO_VERSION=${{ steps.versions.outputs.go }}
            CHAINSAW_VERSION=${{ steps.versions.outputs.chainsaw }}
            VERSION=${{ github.ref_name }}
          tags: ${{ env.GATE_IMAGE }}:${{ needs.detect.outputs.candidate_tag }}-${{ matrix.arch }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.title=aicr-gate
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  # =============================================================================
  # Docker Manifest: Combine per-arch images into multi-arch manifests
  # =============================================================================

  docker-manifest:
    name: Docker Manifest
    runs-on: ubuntu-latest
    needs: [detect, build-docker, build-gate]
    timeout-minutes: 5
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Authenticate to registry
        uses: ./.github/actions/ghcr-login

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      # Inline by design: this job creates only run-unique candidate manifests.
      # The shared docker-manifest action also writes public aliases, which must
      # remain behind the scan and attestation gates.
      - name: Create candidate manifests
        env:
          CANDIDATE_TAG: ${{ needs.detect.outputs.candidate_tag }}
        run: |
          set -euo pipefail
          IMAGES=()
          for phase in ${VALIDATOR_PHASES}; do IMAGES+=("${VALIDATOR_IMAGE_PREFIX}/${phase}"); done
          IMAGES+=("${GATE_IMAGE}")
          for IMAGE in "${IMAGES[@]}"; do
            docker buildx imagetools create \
              -t "${IMAGE}:${CANDIDATE_TAG}" \
              "${IMAGE}:${CANDIDATE_TAG}-amd64" \
              "${IMAGE}:${CANDIDATE_TAG}-arm64"
          done

      - name: Verify multi-arch manifests
        env:
          CANDIDATE_TAG: ${{ needs.detect.outputs.candidate_tag }}
        run: |
          set -euo pipefail
          IMAGES=()
          for phase in ${VALIDATOR_PHASES}; do IMAGES+=("${VALIDATOR_IMAGE_PREFIX}/${phase}"); done
          IMAGES+=("${GATE_IMAGE}")
          for IMAGE in "${IMAGES[@]}"; do
            MANIFEST=$(docker buildx imagetools inspect --raw "${IMAGE}:${CANDIDATE_TAG}")

            PLATFORMS=$(echo "${MANIFEST}" | jq -r \
              '[.manifests[] | select(.platform.os != "unknown") | "\(.platform.os)/\(.platform.architecture)"] | sort | .[]')

            for expected in ${EXPECTED_PLATFORMS}; do
              if ! echo "${PLATFORMS}" | grep -qx "${expected}"; then
                echo "::error::${IMAGE}:${CANDIDATE_TAG} missing platform ${expected}"
                exit 1
              fi
            done

            if echo "${MANIFEST}" | jq -e '.manifests[] | select(.platform.os == "unknown")' >/dev/null 2>&1; then
              echo "::error::${IMAGE}:${CANDIDATE_TAG} contains unknown/unknown descriptor"
              exit 1
            fi
          done

  # =============================================================================
  # Resolve Candidates: one authoritative digest map for every downstream gate
  # =============================================================================

  resolve-candidates:
    name: Resolve Candidate Digests
    runs-on: ubuntu-latest
    needs: [detect, build-ko, docker-manifest]
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
    outputs:
      digest_map: ${{ steps.resolve.outputs.digest_map }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Load versions
        id: versions
        uses: ./.github/actions/load-versions

      - name: Authenticate to registry
        uses: ./.github/actions/ghcr-login

      - name: Setup crane
        uses: ./.github/actions/setup-build-tools
        with:
          install_crane: 'true'
          crane_version: ${{ steps.versions.outputs.crane }}

      - name: Resolve and validate candidates
        id: resolve
        env:
          CANDIDATE_TAG: ${{ needs.detect.outputs.candidate_tag }}
          RELEASE_TAG: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          AICR_NETWORK_TIMEOUT_SECONDS: '120'
        run: |
          set -euo pipefail
          .github/scripts/release-images.sh resolve candidate-digests.json
          digest_map="$(jq -cS . candidate-digests.json)"
          echo "digest_map=${digest_map}" >> "$GITHUB_OUTPUT"

      - name: Upload candidate digest map
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: release-candidate-digests-${{ needs.detect.outputs.candidate_tag }}-attempt-${{ github.run_attempt }}
          path: candidate-digests.json
          if-no-files-found: error
          retention-days: 14

  # =============================================================================
  # Container Image Vulnerability Scan (runs after all images are built)
  # =============================================================================

  image-vuln-scan:
    name: Image Vuln Scan (${{ matrix.image.key }}/${{ matrix.platform.arch }})
    runs-on: ubuntu-latest
    needs: [resolve-candidates]
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - key: aicr
            ref: ghcr.io/nvidia/aicr
          - key: aicrd
            ref: ghcr.io/nvidia/aicrd
          - key: deployment
            ref: ghcr.io/nvidia/aicr-validators/deployment
          - key: performance
            ref: ghcr.io/nvidia/aicr-validators/performance
          - key: conformance
            ref: ghcr.io/nvidia/aicr-validators/conformance
          - key: aiperf-bench
            ref: ghcr.io/nvidia/aicr-validators/aiperf-bench
          - key: gate
            ref: ghcr.io/nvidia/aicr-gate
        platform:
          - name: linux/amd64
            arch: amd64
          - name: linux/arm64
            arch: arm64
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Authenticate to registry
        uses: ./.github/actions/ghcr-login

      - name: Scan container image
        id: scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        env:
          GRYPE_PLATFORM: ${{ matrix.platform.name }}
        with:
          image: '${{ matrix.image.ref }}@${{ fromJSON(needs.resolve-candidates.outputs.digest_map)[matrix.image.key] }}'
          severity-cutoff: 'high'
          output-format: sarif
          only-fixed: true
          fail-build: true
          config: .grype.yaml
          # OpenVEX statements with per-CVE reachability evidence for
          # aiperf-bench suppressions. Grype applies statements only to
          # products whose PURL matches, so this is a no-op for the other
          # images in the matrix. Must mirror the input in
          # vuln-scan-images.yaml or the release scan re-flags CVEs that
          # the dedicated scan already suppressed.
          vex: .openvex.json
        continue-on-error: true

      - name: Upload SARIF to GitHub Security
        if: hashFiles('results.sarif') != '' || steps.scan.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4.37.0
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: 'anchore-image-${{ matrix.image.key }}-${{ matrix.platform.arch }}'
        continue-on-error: true

      - name: Fail on vulnerabilities
        if: steps.scan.outcome == 'failure'
        shell: bash
        env:
          IMAGE_REF: '${{ matrix.image.ref }}@${{ fromJSON(needs.resolve-candidates.outputs.digest_map)[matrix.image.key] }}'
        run: |
          set -euo pipefail
          echo "::error::Vulnerability scan found issues in ${IMAGE_REF}"
          echo "Check the Security tab for details."
          exit 1

  # =============================================================================
  # Attestation Job (runs after all images are pushed and scanned)
  # =============================================================================

  # Attestation is generated from a REUSABLE workflow on purpose: that is what
  # makes the image provenance SLSA Build Level 3 (the builder identity becomes
  # attest-images.yaml, verifiable via `gh attestation verify --signer-workflow`).
  # Generating it inline in this caller workflow would only be Build Level 2.
  # See #1536.
  attest:
    name: Attest Images
    needs: [detect, image-vuln-scan, resolve-candidates]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/attest-images.yaml
    with:
      candidate_tag: ${{ needs.detect.outputs.candidate_tag }}
      digest_map: ${{ needs.resolve-candidates.outputs.digest_map }}


  # =============================================================================
  # Integrity: require resolution, scan, and attestation to all succeed
  # =============================================================================

  release-check:
    name: Release Integrity Check
    runs-on: ubuntu-latest
    needs: [resolve-candidates, image-vuln-scan, attest]
    if: always()
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Check release security gates
        env:
          RESOLVE_RESULT: ${{ needs.resolve-candidates.result }}
          SCAN_RESULT: ${{ needs.image-vuln-scan.result }}
          ATTEST_RESULT: ${{ needs.attest.result }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ "${RESOLVE_RESULT}" != "success" || \
            "${SCAN_RESULT}" != "success" || \
            "${ATTEST_RESULT}" != "success" ]]; then
            echo "::error::Release security gates did not all succeed for ${TAG}."
            echo "::error::Candidate aliases remain non-public; repair the failure and rerun this tag."
            exit 1
          fi

          echo "Release integrity check passed."

  # =============================================================================
  # Promote: preflight all public aliases, then converge them to exact digests
  # =============================================================================

  promote-images:
    name: Promote Image Aliases
    runs-on: ubuntu-latest
    needs: [detect, resolve-candidates, release-check]
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
      attestations: read
    concurrency:
      group: aicr-release-image-alias-promotion
      cancel-in-progress: false
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Load versions
        id: versions
        uses: ./.github/actions/load-versions

      - name: Authenticate to registry
        uses: ./.github/actions/ghcr-login

      - name: Setup crane
        uses: ./.github/actions/setup-build-tools
        with:
          install_crane: 'true'
          crane_version: ${{ steps.versions.outputs.crane }}

      - name: Preflight image promotion
        env:
          CANDIDATE_TAG: ${{ needs.detect.outputs.candidate_tag }}
          RELEASE_TAG: ${{ github.ref_name }}
          IS_PRERELEASE: ${{ needs.detect.outputs.is_prerelease }}
          GITHUB_SHA: ${{ github.sha }}
          GH_TOKEN: ${{ github.token }}
          DIGEST_MAP: ${{ needs.resolve-candidates.outputs.digest_map }}
          AICR_NETWORK_TIMEOUT_SECONDS: '120'
        run: |
          set -euo pipefail
          printf '%s\n' "${DIGEST_MAP}" > candidate-digests.json
          .github/scripts/release-images.sh preflight \
            candidate-digests.json validated-digests.json

      - name: Promote image aliases
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          IS_PRERELEASE: ${{ needs.detect.outputs.is_prerelease }}
          GH_TOKEN: ${{ github.token }}
          AICR_NETWORK_TIMEOUT_SECONDS: '120'
        run: |
          set -euo pipefail
          .github/scripts/release-images.sh promote validated-digests.json

  # =============================================================================
  # Deploy Job (runs after release is published)
  # =============================================================================

  deploy:
    needs: [detect, publish]
    if: needs.detect.outputs.is_prerelease == 'false'
    uses: ./.github/workflows/deploy.yaml
    permissions:
      contents: read
      packages: read
      id-token: write
    with:
      image_tag: ${{ github.ref_name }}

  # =============================================================================
  # Publish: Flip draft release to public after attestation succeeds
  # =============================================================================

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [detect, promote-images]
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Publish validated GitHub release
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          IS_PRERELEASE: ${{ needs.detect.outputs.is_prerelease }}
          GH_TOKEN: ${{ github.token }}
          AICR_NETWORK_TIMEOUT_SECONDS: '120'
        run: |
          set -euo pipefail
          .github/scripts/release-images.sh publish-release

  # =============================================================================
  # Homebrew: publish only after the stable GitHub release is public
  # =============================================================================

  publish-homebrew:
    name: Publish Homebrew Formula
    runs-on: ubuntu-latest
    needs: [detect, build-ko, publish]
    if: needs.detect.outputs.is_prerelease == 'false'
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    concurrency:
      group: aicr-homebrew-publication
      cancel-in-progress: false
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Download Homebrew formula
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ needs.build-ko.outputs.homebrew_artifact_name }}
          path: /tmp/aicr-homebrew-formula

      # Inline by design: this is the only post-publication consumer and the
      # only job that receives the deploy key; formula validation and mutation
      # live in the independently tested publish-homebrew.sh script.
      - name: Validate Homebrew artifact content
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find /tmp/aicr-homebrew-formula -mindepth 1 -maxdepth 1 -type f -print0)
          if [[ "${#files[@]}" -ne 1 || "$(basename -- "${files[0]}")" != "aicr.rb" ]]; then
            echo "::error::Homebrew artifact must contain exactly aicr.rb"
            exit 1
          fi
          if find /tmp/aicr-homebrew-formula -mindepth 1 -maxdepth 1 ! -type f -print -quit | grep -q .; then
            echo "::error::Homebrew artifact contains an unexpected entry"
            exit 1
          fi

      - name: Validate and publish Homebrew formula
        env:
          DEPLOY_KEY: ${{ secrets.HOMEBREW_DEPLOY_KEY }}
          RELEASE_TAG: ${{ github.ref_name }}
          AICR_NETWORK_TIMEOUT_SECONDS: '120'
        run: |
          set -euo pipefail
          umask 077
          work_dir="$(mktemp -d)"
          key_file="${work_dir}/deploy-key"
          known_hosts="${work_dir}/known-hosts"
          tap_dir="${work_dir}/tap"
          cleanup() {
            rm -rf -- "${work_dir}"
          }
          trap cleanup EXIT
          if [[ -z "${DEPLOY_KEY}" || "${DEPLOY_KEY}" == *$'\r'* ]]; then
            echo "::error::Homebrew deploy key is missing or malformed"
            exit 1
          fi
          printf '%s\n' "${DEPLOY_KEY}" > "${key_file}"
          chmod 0600 "${key_file}"
          timeout 30s ssh-keyscan -t rsa github.com > "${known_hosts}"
          fingerprints="$(ssh-keygen -lf "${known_hosts}" -E sha256 | awk '{print $2}' | sort -u)"
          if [[ "${fingerprints}" != "SHA256:uNiVztksCsDhcc0u9e8BujQXVUpKZIDTMczCvj3tD2s" ]]; then
            echo "::error::GitHub RSA host-key fingerprint mismatch"
            exit 1
          fi
          export GIT_SSH_COMMAND="ssh -i ${key_file} -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=${known_hosts}"
          timeout 2m git clone --depth 1 git@github.com:NVIDIA/homebrew-aicr.git "${tap_dir}"
          result="$(.github/scripts/publish-homebrew.sh /tmp/aicr-homebrew-formula/aicr.rb "${tap_dir}")"
          case "${result}" in
            changed=false)
              exit 0
              ;;
            changed=true)
              ;;
            *)
              echo "::error::unexpected Homebrew publication result"
              exit 1
              ;;
          esac
          git -C "${tap_dir}" config user.name github-actions
          git -C "${tap_dir}" config user.email github-actions@github.com
          git -C "${tap_dir}" add Formula/aicr.rb
          if [[ "$(git -C "${tap_dir}" diff --cached --name-only)" != "Formula/aicr.rb" ]]; then
            echo "::error::Homebrew update changed files outside Formula/aicr.rb"
            exit 1
          fi
          git -C "${tap_dir}" commit -m "Brew formula update for aicr version ${RELEASE_TAG}"
          timeout 2m git -C "${tap_dir}" push origin HEAD:main

  # =============================================================================
  # Notify: Post release announcement to Slack
  # =============================================================================

  notify:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: [detect, publish]
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Post to Slack
        env:
          SLACK_SERVICE: ${{ secrets.SLACK_SERVICE }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          SERVER: ${{ github.server_url }}
          IS_PRERELEASE: ${{ needs.detect.outputs.is_prerelease }}
        run: |
          set -euo pipefail
          RELEASE_TYPE="stable"
          if [[ "${IS_PRERELEASE}" == "true" ]]; then
            RELEASE_TYPE="pre-release"
          fi
          RELEASE_URL="${SERVER}/${REPO}/releases/tag/${TAG}"
          curl -sSf -X POST \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"AICR ${TAG} has been released (${RELEASE_TYPE}): ${RELEASE_URL}\"}" \
            "https://hooks.slack.com/services/${SLACK_SERVICE}"

  # =============================================================================
  # Summary: Release pipeline report (always runs, even on failure)
  # =============================================================================

  summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [detect, tests, build-ko, build-docker, build-gate, docker-manifest, resolve-candidates, image-vuln-scan, attest, release-check, promote-images, publish, publish-homebrew, deploy, notify]
    if: always()
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Release Summary
        env:
          TESTS: ${{ needs.tests.result }}
          BUILD_KO: ${{ needs.build-ko.result }}
          BUILD_DOCKER: ${{ needs.build-docker.result }}
          BUILD_GATE: ${{ needs.build-gate.result }}
          MANIFEST: ${{ needs.docker-manifest.result }}
          RESOLVE: ${{ needs.resolve-candidates.result }}
          VULN_SCAN: ${{ needs.image-vuln-scan.result }}
          ATTEST: ${{ needs.attest.result }}
          RELEASE_CHECK: ${{ needs.release-check.result }}
          PROMOTE: ${{ needs.promote-images.result }}
          PUBLISH: ${{ needs.publish.result }}
          HOMEBREW: ${{ needs.publish-homebrew.result }}
          DEPLOY: ${{ needs.deploy.result }}
          NOTIFY: ${{ needs.notify.result }}
          TAG: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          IS_PRERELEASE: ${{ needs.detect.outputs.is_prerelease }}
        run: |
          set -euo pipefail
          {
            echo "## Release Summary"
            echo ""
            RELEASE_TYPE="stable"; [[ "${IS_PRERELEASE}" == "true" ]] && RELEASE_TYPE="pre-release"
            echo "**Tag:** \`${TAG}\`  **Commit:** \`${COMMIT}\`  **Type:** ${RELEASE_TYPE}"
            echo ""
            echo "| Phase | Result |"
            echo "|-------|--------|"
            echo "| Tests | ${TESTS} |"
            echo "| Build (Ko) | ${BUILD_KO} |"
            echo "| Build (Docker) | ${BUILD_DOCKER} |"
            echo "| Build (Gate) | ${BUILD_GATE} |"
            echo "| Docker Manifest | ${MANIFEST} |"
            echo "| Resolve Candidate Digests | ${RESOLVE} |"
            echo "| Vulnerability Scan | ${VULN_SCAN} |"
            echo "| Attestation | ${ATTEST} |"
            echo "| Release Check | ${RELEASE_CHECK} |"
            echo "| Image Promotion | ${PROMOTE} |"
            echo "| Publish | ${PUBLISH} |"
            echo "| Homebrew | ${HOMEBREW} |"
            echo "| Deploy | ${DEPLOY} |"
            echo "| Slack Notification | ${NOTIFY} |"
          } >> "$GITHUB_STEP_SUMMARY"
