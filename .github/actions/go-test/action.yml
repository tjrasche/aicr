name: 'Go Test'
description: 'Setup Go, verify vendor, run unit tests with race detector and coverage'

inputs:
  go_version:
    description: 'Go version to install (e.g., 1.25)'
    required: true
  coverage_report:
    description: 'Whether to generate coverage report (true/false)'
    required: false
    default: 'false'
  coverage_threshold:
    description: 'Minimum coverage percentage required'
    required: false
    default: ''
  helm_version:
    description: 'Helm version pinned in .settings.yaml (testing_tools.helm, via load-versions) — required by the argocd-helm live-render tests, which fail (not skip) in CI when helm is missing'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Setup Go
      uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
      with:
        go-version: '${{ inputs.go_version }}'
        cache: true
        cache-dependency-path: |
          go.sum
          vendor/modules.txt
        check-latest: true

    - name: Verify vendor is in sync
      shell: bash
      run: |
        go mod vendor
        git diff --exit-code vendor/ || (echo "vendor/ is out of sync with go.mod/go.sum; run 'make tidy' and commit go.mod, go.sum, and vendor/" && exit 1)

    # The ubuntu-latest runner image bundles Helm 3; the unit tests that
    # shell out to helm (pkg/bundler/deployer/argocdhelm live-render tests)
    # must run against the Helm major pinned in .settings.yaml. The
    # setup-build-tools step replaces any preinstalled binary that does not
    # match the pin and fails the job if the install fails.
    - name: Install Helm
      uses: ./.github/actions/setup-build-tools
      with:
        install_helm: 'true'
        helm_version: '${{ inputs.helm_version }}'

    - name: Install envtest binaries
      shell: bash
      run: |
        go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
        setup-envtest use --print path >/dev/null 2>&1

    - name: Run Tests with Coverage
      shell: bash
      run: make test

    - name: Coverage Report
      if: inputs.coverage_report == 'true'
      uses: ./.github/actions/go-coverage
      with:
        coverage_file: ./coverage.out
        threshold: ${{ inputs.coverage_threshold }}
