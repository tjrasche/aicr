# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: cli-duplicate-flags
spec:
  description: |
    Validates that duplicate single-value flags are rejected.
    Replaces test_duplicate_flag_validation() in tools/e2e.
    No cluster needed.
  timeouts:
    exec: 30s
  steps:
    - name: setup
      description: Generate a recipe for use in duplicate flag tests.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-duplicate-flags"
              rm -rf "${WORK}" && mkdir -p "${WORK}"
              ${AICR_BIN} recipe --service eks --accelerator h100 --intent training \
                -o "${WORK}/recipe.yaml"

    - name: duplicate-bundle-recipe
      description: Duplicate --recipe flag on bundle must fail.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-duplicate-flags"
              ${AICR_BIN} bundle --recipe "${WORK}/recipe.yaml" --recipe "${WORK}/recipe.yaml" \
                -o "${WORK}/out" 2>&1 || true
            check:
              (contains($stderr, 'can only be specified once') || contains($stdout, 'can only be specified once')): true

    - name: duplicate-validate-recipe
      description: Duplicate --recipe flag on validate must fail.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-duplicate-flags"
              ${AICR_BIN} validate --recipe "${WORK}/recipe.yaml" --recipe "${WORK}/recipe.yaml" \
                --snapshot "${WORK}/recipe.yaml" --no-cluster 2>&1 || true
            check:
              (contains($stderr, 'can only be specified once') || contains($stdout, 'can only be specified once')): true

    - name: duplicate-recipe-service
      description: Duplicate --service flag on recipe must fail.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              ${AICR_BIN} recipe --service eks --service gke --accelerator h100 --intent training 2>&1 || true
            check:
              (contains($stderr, 'can only be specified once') || contains($stdout, 'can only be specified once')): true

    - name: duplicate-bundle-app-name
      description: Duplicate --app-name flag on bundle must fail.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-duplicate-flags"
              ${AICR_BIN} bundle --recipe "${WORK}/recipe.yaml" \
                --deployer argocd-helm \
                --app-name first --app-name second \
                -o "${WORK}/out" 2>&1 || true
            check:
              (contains($stderr, 'can only be specified once') || contains($stdout, 'can only be specified once')): true
      cleanup:
        - script:
            content: |
              rm -rf /tmp/chainsaw-duplicate-flags
