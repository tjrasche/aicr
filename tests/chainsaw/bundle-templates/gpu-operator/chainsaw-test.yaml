# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: cli-bundle-gpu-operator-templates
spec:
  description: |
    Validates that gpu-operator manifest templates render correctly.
    Tests the dcgm-exporter ConfigMap creation and disable gate.
    Run with: AICR_BIN=$(pwd)/dist/e2e/aicr chainsaw test --no-cluster --test-dir tests/chainsaw/bundle-templates/gpu-operator
  timeouts:
    exec: 30s
  steps:

    - name: generate-recipe
      description: Generate an EKS H100 training recipe.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-bundle-gpu-operator-templates"
              rm -rf "${WORK}" && mkdir -p "${WORK}"
              ${AICR_BIN} recipe \
                --service eks \
                --accelerator h100 \
                --os ubuntu \
                --intent training \
                --output "${WORK}/recipe.yaml"

    ## ── DCGM Exporter: default (enabled) ───────────────────────────────

    - name: bundle-dcgm-defaults
      description: Generate bundle with default dcgm-exporter config.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-bundle-gpu-operator-templates"
              rm -rf "${WORK}/bundle-defaults"
              ${AICR_BIN} bundle \
                --recipe "${WORK}/recipe.yaml" \
                --output "${WORK}/bundle-defaults"

    - name: assert-dcgm-defaults
      description: Verify dcgm-exporter ConfigMap is rendered into the values.
      try:
        - script:
            content: |
              WORK="/tmp/chainsaw-bundle-gpu-operator-templates"
              # The upstream gpu-operator chart renders the dcgm-exporter
              # ConfigMap directly from values.yaml under
              # dcgmExporter.config.data; AICR no longer ships a separate
              # post-manifest for it. Verify the values block carries the
              # config (name + non-empty data) the chart needs to render
              # the ConfigMap at install time.
              VALUES=$(ls "${WORK}"/bundle-defaults/[0-9][0-9][0-9]-gpu-operator/values.yaml 2>/dev/null | head -1)
              [ -n "${VALUES}" ] || { echo "values.yaml not found in any *-gpu-operator/" >&2; exit 1; }
              # Scope assertions to dcgmExporter.config so unrelated keys
              # (env vars, label values, sibling sections) cannot satisfy them.
              yq e -e '.dcgmExporter.config.create == true' "${VALUES}" >/dev/null \
                || { echo "FAIL: dcgmExporter.config.create not true" >&2; cat "${VALUES}" >&2; exit 1; }
              yq e -e '.dcgmExporter.config.name == "dcgm-exporter"' "${VALUES}" >/dev/null \
                || { echo "FAIL: dcgmExporter.config.name not set to dcgm-exporter" >&2; cat "${VALUES}" >&2; exit 1; }
              yq e -e '.dcgmExporter.config.data | test("DCGM_FI_DEV_GPU_TEMP")' "${VALUES}" >/dev/null \
                || { echo "FAIL: dcgmExporter.config.data missing custom metrics" >&2; exit 1; }
              # Defense in depth: no post-manifest should be emitted for dcgm-exporter.
              if ls "${WORK}"/bundle-defaults/[0-9][0-9][0-9]-gpu-operator-post/templates/dcgm-exporter.yaml >/dev/null 2>&1; then
                echo "FAIL: stray dcgm-exporter post-manifest found" >&2
                exit 1
              fi

    ## ── DCGM Exporter: disabled ────────────────────────────────────────

    - name: bundle-dcgm-disabled
      description: Generate bundle with dcgm-exporter config creation disabled.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-bundle-gpu-operator-templates"
              rm -rf "${WORK}/bundle-dcgm-disabled"
              ${AICR_BIN} bundle \
                --recipe "${WORK}/recipe.yaml" \
                --output "${WORK}/bundle-dcgm-disabled" \
                --set gpuoperator:dcgmExporter.config.create=false

    - name: assert-dcgm-disabled
      description: Verify the override flows into values when create=false.
      try:
        - script:
            content: |
              WORK="/tmp/chainsaw-bundle-gpu-operator-templates"
              # The upstream chart gates the ConfigMap on `config.create`
              # AND non-empty `config.data` — when the override sets
              # create=false, the chart skips the ConfigMap at install time.
              VALUES=$(ls "${WORK}"/bundle-dcgm-disabled/[0-9][0-9][0-9]-gpu-operator/values.yaml 2>/dev/null | head -1)
              [ -n "${VALUES}" ] || { echo "values.yaml not found in any *-gpu-operator/" >&2; exit 1; }
              # Anchor to dcgmExporter.config.create — a stray `create: false`
              # at another path must not satisfy this check.
              yq e -e '.dcgmExporter.config.create == false' "${VALUES}" >/dev/null \
                || { echo "FAIL: dcgmExporter.config.create not set to false" >&2; cat "${VALUES}" >&2; exit 1; }
              if ls "${WORK}"/bundle-dcgm-disabled/[0-9][0-9][0-9]-gpu-operator-post/templates/dcgm-exporter.yaml >/dev/null 2>&1; then
                echo "FAIL: stray dcgm-exporter post-manifest found" >&2
                exit 1
              fi
      cleanup:
        - script:
            content: |
              rm -rf /tmp/chainsaw-bundle-gpu-operator-templates
