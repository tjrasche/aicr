# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: cli-bundle-agentgateway-templates
spec:
  description: |
    Validates that agentgateway manifest templates render correctly.
    Tests inference-gateway AgentgatewayParameters scheduling (nodeSelector/tolerations)
    and the default LoadBalancer source-range restriction (loadBalancerSourceRanges).
    Run with: AICR_BIN=$(pwd)/dist/e2e/aicr chainsaw test --no-cluster --test-dir tests/chainsaw/bundle-templates/agentgateway
  timeouts:
    exec: 30s
  steps:

    - name: generate-recipe
      description: Generate an EKS H100 inference recipe (agentgateway is inference-only).
      try:
        - script:
            content: |
              set -e
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-bundle-agentgateway-templates"
              rm -rf "${WORK}" && mkdir -p "${WORK}"
              ${AICR_BIN} recipe \
                --service eks \
                --accelerator h100 \
                --os ubuntu \
                --intent inference \
                --output "${WORK}/recipe.yaml"

    ## ── Default: private-by-default when allowedSourceRanges is unset ──

    - name: bundle-defaults-private
      description: |
        With no allowedSourceRanges override, bundle succeeds but defaults the
        inference-gateway to private RFC1918 ranges (#1373) — it never emits a
        LoadBalancer open to 0.0.0.0/0.
      try:
        - script:
            # set -e so EVERY assertion is fail-closed: a missing resource or a
            # missing default range must fail the step.
            content: |
              set -e
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-bundle-agentgateway-templates"
              rm -rf "${WORK}/bundle-defaults"
              ${AICR_BIN} bundle \
                --recipe "${WORK}/recipe.yaml" \
                --output "${WORK}/bundle-defaults"
              ## agentgateway is a mixed component (upstream Helm + raw manifests),
              ## so its raw manifests render into an injected NNN-agentgateway-post/
              ## wrapped chart's templates/ folder under #662's layout.
              MANIFEST=$(ls "${WORK}"/bundle-defaults/[0-9][0-9][0-9]-agentgateway-post/templates/inference-gateway.yaml 2>/dev/null | head -1)
              [ -n "${MANIFEST}" ] || { echo "agentgateway inference-gateway.yaml not found" >&2; exit 1; }
              grep -q 'kind: AgentgatewayParameters' "${MANIFEST}"
              grep -q 'kind: Gateway' "${MANIFEST}"
              ## The private-by-default RFC1918 ranges must be rendered onto the
              ## Service, and an any-source range must NOT appear.
              grep -q 'loadBalancerSourceRanges:' "${MANIFEST}"
              ## Match list entries, not the surrounding template comments (which
              ## mention these tokens), so the assertions key off the rendered
              ## loadBalancerSourceRanges list only.
              grep -Eq '^[[:space:]]*-[[:space:]]*10\.0\.0\.0/8([[:space:]]|$)' "${MANIFEST}"
              grep -Eq '^[[:space:]]*-[[:space:]]*172\.16\.0\.0/12([[:space:]]|$)' "${MANIFEST}"
              grep -Eq '^[[:space:]]*-[[:space:]]*192\.168\.0\.0/16([[:space:]]|$)' "${MANIFEST}"
              ! grep -Eq '^[[:space:]]*-[[:space:]]*0\.0\.0\.0/0([[:space:]]|$)' "${MANIFEST}"
              ! grep -Eq '^[[:space:]]*-[[:space:]]*::/0([[:space:]]|$)' "${MANIFEST}"

    ## ── With LoadBalancer source-range restriction ─────────────────────

    - name: bundle-source-ranges
      description: Override agentgateway.allowedSourceRanges via the recipe componentRef.
      try:
        - script:
            content: |
              set -e
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-bundle-agentgateway-templates"
              rm -rf "${WORK}/bundle-source-ranges"
              ## --set renders a type-invalid string for this key, so operators scope
              ## the gateway through an overlay/componentRef override. Inject one here.
              cp "${WORK}/recipe.yaml" "${WORK}/recipe-sr.yaml"
              yq -i '(.componentRefs[] | select(.name == "agentgateway")).overrides.allowedSourceRanges = ["216.228.127.128/30"]' \
                "${WORK}/recipe-sr.yaml"
              ${AICR_BIN} bundle \
                --recipe "${WORK}/recipe-sr.yaml" \
                --output "${WORK}/bundle-source-ranges"

    - name: assert-gateway-source-ranges
      description: Verify the override renders loadBalancerSourceRanges onto the Service.
      try:
        - script:
            # set -e so a failed first grep (e.g. the loadBalancerSourceRanges field
            # name is wrong) cannot be masked by the trailing CIDR grep succeeding.
            content: |
              set -e
              WORK="/tmp/chainsaw-bundle-agentgateway-templates"
              MANIFEST=$(ls "${WORK}"/bundle-source-ranges/[0-9][0-9][0-9]-agentgateway-post/templates/inference-gateway.yaml 2>/dev/null | head -1)
              [ -n "${MANIFEST}" ] || { echo "agentgateway inference-gateway.yaml not found in source-ranges bundle" >&2; exit 1; }
              ## The configured CIDR must reach the generated Service's
              ## spec.service.spec.loadBalancerSourceRanges.
              grep -q 'loadBalancerSourceRanges:' "${MANIFEST}"
              grep -q '216.228.127.128/30' "${MANIFEST}"

    ## ── With system node scheduling ────────────────────────────────────

    - name: bundle-scheduling
      description: Generate bundle with system node selector.
      try:
        - script:
            content: |
              set -e
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-bundle-agentgateway-templates"
              rm -rf "${WORK}/bundle-scheduling"
              ## Plain recipe (no allowedSourceRanges override): the bundle
              ## generates fine because allowedSourceRanges defaults to private
              ## RFC1918 ranges (#1373). This step asserts scheduling injection,
              ## not the exposure behavior.
              ${AICR_BIN} bundle \
                --recipe "${WORK}/recipe.yaml" \
                --output "${WORK}/bundle-scheduling" \
                --system-node-selector nodeGroup=system-pool

    - name: assert-gateway-scheduling
      description: Verify AgentgatewayParameters has nodeSelector for proxy pods.
      try:
        - script:
            content: |
              set -e
              WORK="/tmp/chainsaw-bundle-agentgateway-templates"
              MANIFEST=$(ls "${WORK}"/bundle-scheduling/[0-9][0-9][0-9]-agentgateway-post/templates/inference-gateway.yaml 2>/dev/null | head -1)
              [ -n "${MANIFEST}" ] || { echo "agentgateway inference-gateway.yaml not found in scheduling bundle" >&2; exit 1; }
              ## Verify nodeSelector was injected into AgentgatewayParameters
              grep -q 'nodeSelector:' "${MANIFEST}"
              grep -q 'nodeGroup: system-pool' "${MANIFEST}"
      cleanup:
        - script:
            content: |
              set -e
              rm -rf /tmp/chainsaw-bundle-agentgateway-templates
