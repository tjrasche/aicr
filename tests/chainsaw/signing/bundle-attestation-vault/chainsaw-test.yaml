# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: cli-bundle-attestation-vault
  labels:
    requires: openbao
    ci: "true" # needs a CI-attested binary; excluded from fork e2e (no OIDC)
    external-service: "true" # needs a live OpenBAO/Vault; excluded from the generic sweep, run only by vault-kms-e2e.yaml
spec:
  description: |
    KMS-backed bundle signing and verification round-trip against a HashiCorp
    Vault-compatible Transit secrets engine (OpenBAO, https://openbao.org).
    Exercises the hashivault:// signing/verification path end to end.

    Requires a Vault/OpenBAO server reachable at VAULT_ADDR with VAULT_TOKEN set,
    the Transit secrets engine mounted at transit/, and an ECDSA P-256 signing
    key named ${VAULT_KMS_KEY} (default: aicr) already provisioned. The KMS URI
    format is: hashivault://<transit-key-name>
    Skipped in normal --no-cluster runs; activated with --selector 'requires=openbao'.
  timeouts:
    exec: 120s
  steps:
    - name: setup
      description: Generate recipe for KMS attestation tests.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-bundle-attestation-vault"
              rm -rf "${WORK}" && mkdir -p "${WORK}"
              "${AICR_BIN}" recipe --service eks --accelerator h100 --os ubuntu \
                --intent training -o "${WORK}/recipe.yaml"
            check:
              ($error == null): true

    - name: resolve-kms-uri
      description: Build the hashivault:// KMS URI for the provisioned Transit key.
      try:
        - script:
            content: |
              # The sigstore hashivault provider reads the Vault address and token
              # from VAULT_ADDR / VAULT_TOKEN (BAO_ADDR / BAO_TOKEN also work); the
              # URI carries only the Transit key name.
              : "${VAULT_ADDR:?Set VAULT_ADDR to the Vault/OpenBAO endpoint}"
              : "${VAULT_TOKEN:?Set VAULT_TOKEN to the Vault/OpenBAO token}"
              KEY="${VAULT_KMS_KEY:-aicr}"
              KMS_URI="hashivault://${KEY}"
              echo "KMS_URI=${KMS_URI}" > /tmp/chainsaw-bundle-attestation-vault/kms-env
              echo "Resolved KMS URI: ${KMS_URI}"
            check:
              ($error == null): true

    - name: bundle-with-kms-signing
      description: |
        Create a bundle attested with the Vault Transit key. Public-key signing:
        no Fulcio certificate (not keyless), but the attestation is still logged
        to the public Sigstore Rekor transparency log by default.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-bundle-attestation-vault"
              . "${WORK}/kms-env"

              # --certificate-identity-regexp pins the *binary* attestation identity.
              # The CI binary is attested by this e2e workflow, not the on-tag release
              # workflow that the default trust pattern accepts, so the bundler must be
              # told the expected identity or it rejects the binary. Empty locally
              # (where --attest cannot run anyway without a CI-attested binary).
              "${AICR_BIN}" bundle -r "${WORK}/recipe.yaml" \
                -o "${WORK}/bundle" \
                --attest \
                --signing-key "${KMS_URI}" \
                --certificate-identity-regexp "${AICR_IDENTITY_REGEXP:-}"
            check:
              ($error == null): true

    - name: bundle-has-attestation-file
      description: KMS-signed bundle contains bundle-attestation.sigstore.json with no Fulcio cert.
      try:
        - script:
            content: |
              WORK="/tmp/chainsaw-bundle-attestation-vault"
              ATTEST="${WORK}/bundle/attestation/bundle-attestation.sigstore.json"

              # Attestation file must exist
              test -f "${ATTEST}"

              # Standard bundle files must also be present
              test -f "${WORK}/bundle/checksums.txt"
              test -f "${WORK}/bundle/recipe.yaml"

              # KMS path: no Fulcio certificate embedded in the bundle.
              # The verificationMaterial block will have a x509CertificateChain or
              # publicKey, not a fulcioCert. Use negative grep to assert absence.
              if python3 -c "
              import json, sys
              with open('${ATTEST}') as f:
                  d = json.load(f)
              vm = d.get('verificationMaterial', {})
              has_fulcio = 'x509CertificateChain' in vm and bool(vm['x509CertificateChain'].get('certificates'))
              print('has_fulcio_cert:', has_fulcio)
              sys.exit(0 if not has_fulcio else 1)
              "; then
                echo "PASS: no Fulcio certificate in KMS-signed attestation (public-key path)"
              else
                echo "FAIL: Fulcio certificate unexpectedly present in KMS-signed attestation"
                exit 1
              fi
            check:
              ($error == null): true

    - name: verify-with-kms-key
      description: Verify KMS-signed bundle using --key with the hashivault:// URI.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-bundle-attestation-vault"
              . "${WORK}/kms-env"

              # Identity regexp pins the binary attestation identity (empty falls
              # back to the production on-tag default; the test binary is attested
              # by this workflow, so AICR_IDENTITY_REGEXP overrides it).
              OUTPUT=$("${AICR_BIN}" verify "${WORK}/bundle" \
                --key "${KMS_URI}" \
                --certificate-identity-regexp "${AICR_IDENTITY_REGEXP:-}" \
                --format json)
              echo "${OUTPUT}"
              # Assert the actual values are true, not just that the fields exist.
              # Grep in-script (not a chainsaw key) because a ': ' inside a
              # (contains(...)) assertion literal breaks chainsaw YAML parsing.
              echo "${OUTPUT}" | grep -q '"checksumsPassed": true'
              echo "${OUTPUT}" | grep -q '"bundleAttested": true'
            check:
              ($error == null): true

    - name: verify-with-pem-public-key
      description: Export the Transit public key from Vault and verify the bundle with the PEM file.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-bundle-attestation-vault"
              : "${VAULT_ADDR:?Set VAULT_ADDR}"
              : "${VAULT_TOKEN:?Set VAULT_TOKEN}"
              KEY="${VAULT_KMS_KEY:-aicr}"
              PEM_FILE="${WORK}/signing-key.pem"

              # Transit exposes the asymmetric public key over the read API. The
              # response nests it under data.keys.<version>.public_key, already PEM.
              # Select the latest version rather than hardcoding "1".
              curl -sf -H "X-Vault-Token: ${VAULT_TOKEN}" \
                "${VAULT_ADDR%/}/v1/transit/keys/${KEY}" \
                | python3 -c "
              import json, sys
              d = json.load(sys.stdin)['data']
              keys = d['keys']
              latest = max(keys, key=lambda k: int(k))
              sys.stdout.write(keys[latest]['public_key'])
              " > "${PEM_FILE}"

              test -s "${PEM_FILE}"
              echo "Public key exported to ${PEM_FILE}"

              # Verify using the PEM file path instead of the KMS URI. Grep in-script
              # (not a chainsaw key): a ': ' inside a (contains(...)) literal breaks
              # chainsaw YAML parsing.
              OUTPUT=$("${AICR_BIN}" verify "${WORK}/bundle" \
                --key "${PEM_FILE}" \
                --certificate-identity-regexp "${AICR_IDENTITY_REGEXP:-}" \
                --format json)
              echo "${OUTPUT}"
              echo "${OUTPUT}" | grep -q '"checksumsPassed": true'
              echo "${OUTPUT}" | grep -q '"bundleAttested": true'
            check:
              ($error == null): true

    - name: verify-min-trust-attested
      description: KMS-signed bundle meets --min-trust-level attested.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-bundle-attestation-vault"
              . "${WORK}/kms-env"

              "${AICR_BIN}" verify "${WORK}/bundle" \
                --key "${KMS_URI}" \
                --certificate-identity-regexp "${AICR_IDENTITY_REGEXP:-}" \
                --min-trust-level attested
            check:
              ($error == null): true

    - name: verify-min-trust-verified
      description: |
        KMS-signed bundle + attested binary meets --min-trust-level verified.
        Skipped when AICR_ATTESTED is not "true" (no binary attestation available).
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-bundle-attestation-vault"
              . "${WORK}/kms-env"

              if [ "${AICR_ATTESTED:-false}" != "true" ]; then
                echo "SKIP: binary not attested (AICR_ATTESTED=${AICR_ATTESTED:-false}); skipping verified-level check"
                exit 0
              fi

              IDENTITY_REGEXP="${AICR_IDENTITY_REGEXP:?Set AICR_IDENTITY_REGEXP to the workflow identity regexp}"

              "${AICR_BIN}" verify "${WORK}/bundle" \
                --key "${KMS_URI}" \
                --certificate-identity-regexp "${IDENTITY_REGEXP}" \
                --min-trust-level verified \
                --format json
            check:
              ($error == null): true

    - name: verify-tamper-detection
      description: Tampering with a KMS-signed bundle is detected.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-bundle-attestation-vault"
              . "${WORK}/kms-env"

              # Tamper with a file
              echo "tampered" >> "${WORK}/bundle/deploy.sh"
              OUTPUT=$("${AICR_BIN}" verify "${WORK}/bundle" \
                --key "${KMS_URI}" \
                --format json --min-trust-level unknown 2>&1)
              echo "$OUTPUT"
              echo "$OUTPUT" | grep -q '"checksumsPassed": false'
            check:
              ($error == null): true

    - name: rebuild-bundle
      description: Rebuild clean bundle for remaining tests.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-bundle-attestation-vault"
              . "${WORK}/kms-env"

              rm -rf "${WORK}/bundle"
              # --certificate-identity-regexp pins the *binary* attestation identity
              # (see bundle-with-kms-signing). Empty locally.
              "${AICR_BIN}" bundle -r "${WORK}/recipe.yaml" \
                -o "${WORK}/bundle" \
                --attest \
                --signing-key "${KMS_URI}" \
                --certificate-identity-regexp "${AICR_IDENTITY_REGEXP:-}"
            check:
              ($error == null): true

    - name: verify-wrong-key-rejected
      description: Verifying with a different Transit key URI is rejected (signature mismatch).
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-bundle-attestation-vault"
              : "${VAULT_ADDR:?Set VAULT_ADDR}"
              : "${VAULT_TOKEN:?Set VAULT_TOKEN}"

              # Provision a second ECDSA P-256 Transit key to use as a wrong-key probe.
              # Derive its name from the signing key so it can never collide with it
              # (a fixed name would alias the signing key when VAULT_KMS_KEY is set to
              # that literal, silently turning this into a same-key check).
              # Idempotent: creating an existing key is a no-op for Transit.
              WRONG_KEY="${VAULT_KMS_KEY:-aicr}-wrong"
              curl -sf -H "X-Vault-Token: ${VAULT_TOKEN}" \
                -X POST -d '{"type":"ecdsa-p256"}' \
                "${VAULT_ADDR%/}/v1/transit/keys/${WRONG_KEY}" >/dev/null
              WRONG_URI="hashivault://${WRONG_KEY}"

              # Verification MUST fail. The bundle was signed with the original key,
              # so the wrong key cannot validate its attestation signature. That
              # mismatch is recorded in the verifier's errors, which makes
              # `aicr verify` exit non-zero. Capture the exit code explicitly (do NOT
              # swallow it with `|| true`, which would mask a false pass) and require
              # a non-zero status. JSON output so the secondary guard can assert too.
              rc=0
              OUTPUT=$("${AICR_BIN}" verify "${WORK}/bundle" \
                --key "${WRONG_URI}" \
                --format json \
                --min-trust-level unknown 2>&1) || rc=$?
              echo "$OUTPUT"

              if [ "${rc}" -eq 0 ]; then
                echo "FAIL: wrong key was accepted (verify exited 0)"
                exit 1
              fi
              # Defense in depth: a rejection must never coincide with a verified
              # signature. (rc is already non-zero here, so this only guards against a
              # future regression that decouples the two.)
              if echo "$OUTPUT" | grep -q '"bundleAttested": true'; then
                echo "FAIL: wrong key reported bundleAttested:true"
                exit 1
              fi
              echo "PASS: wrong key correctly rejected (verify exited ${rc})"
            check:
              ($error == null): true

    - name: cleanup
      description: Remove temporary files.
      try:
        - script:
            content: |
              rm -rf /tmp/chainsaw-bundle-attestation-vault
