# Allow anonymous access to the cluster's OIDC discovery endpoints
# (/.well-known/openid-configuration and /openid/v1/jwks). Fulcio fetches these
# unauthenticated when it builds the verifier for the in-cluster Kubernetes
# ServiceAccount issuer; kind denies anonymous access by default, which Fulcio
# surfaces as "unsupported issuer". Binding the built-in
# system:service-account-issuer-discovery ClusterRole to the anonymous user
# grants exactly that read access and nothing more. Scoped to this e2e cluster.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aicr-e2e-oidc-discovery-anonymous
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:service-account-issuer-discovery
subjects:
  - kind: User
    name: system:anonymous
    apiGroup: rbac.authorization.k8s.io
  - kind: Group
    name: system:unauthenticated
    apiGroup: rbac.authorization.k8s.io
