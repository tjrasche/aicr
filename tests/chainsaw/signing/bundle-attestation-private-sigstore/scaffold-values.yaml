# Helm override values for the sigstore/scaffold umbrella chart, used by both
# run.sh (local) and the sigstore-scaffolding-e2e.yaml CI workflow. The defaults
# deploy plain Deployment + ClusterIP Services (no Knative, no MetalLB), so the
# stack is reachable from a macOS (Colima) or Linux host via `kubectl
# port-forward` alone. Two overrides make it work end-to-end:
#
#   1. Trust the in-cluster Kubernetes ServiceAccount issuer for keyless OIDC.
#      Fulcio mints a signing certificate for a `kubectl create token` SA token
#      (audience "sigstore"). Fulcio still needs (a) to trust the apiserver
#      serving cert when fetching OIDC discovery and (b) anonymous access to the
#      discovery endpoints; run.sh / the workflow supply those out-of-band (an
#      SSL_CERT_FILE env pointing at the mounted cluster CA, plus a
#      system:service-account-issuer-discovery ClusterRoleBinding) because the
#      fulcio subchart exposes neither as a value.
#
#   2. Replace Trillian's MySQL image. The chart defaults to
#      gcr.io/trillian-opensource-ci/db_server, a stale amd64-only MySQL 5.7
#      build (5.7 is past EOL and was never published for arm64), so it is
#      OOM-killed under emulation on Apple Silicon. The official multi-arch
#      mysql image runs arm64-native on Colima and amd64-native in CI, and
#      consumes the same MYSQL_* env vars the chart already sets. The db_server
#      image's /etc/init.d/mysql probes and the --ignore-db-dir arg (removed in
#      MySQL 8) do not apply to the stock image, so both are overridden.

fulcio:
  config:
    contents:
      OIDCIssuers:
        https://kubernetes.default.svc.cluster.local:
          IssuerURL: https://kubernetes.default.svc.cluster.local
          ClientID: sigstore
          Type: kubernetes

trillian:
  mysql:
    image:
      registry: docker.io
      repository: library/mysql
      # renovate: datasource=docker depName=mysql
      # mysql:8.0 (multi-arch: linux/amd64 + linux/arm64/v8)
      version: sha256:7dcddc01f13bab2f15cde676d44d01f61fc9f99fe7785e86196dfc07d358ae2b
    # MySQL 8 removed --ignore-db-dir; the stock image initializes the datadir
    # itself, so pass no extra args.
    args: []
    # Stock mysql has no /etc/init.d/mysql script; probe the TCP port instead.
    livenessProbe:
      exec: null
      tcpSocket:
        port: 3306
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 10
    readinessProbe:
      exec: null
      tcpSocket:
        port: 3306
      initialDelaySeconds: 20
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 10
