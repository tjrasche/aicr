#
# GPUs are requested as scalar nvidia.com/gpu limits — the device-plugin
# production default (#1327).

# Dynamo vLLM smoke test — minimal aggregated inference deployment.
# Deploys a Frontend (API gateway) and a single vLLM decode worker
# serving Qwen/Qwen3-0.6B (public, ungated, ~1.2GB).
# No HuggingFace token required.
#
# Uses the Dynamo 1.2 Kubernetes path: Kubernetes-native discovery plus the
# NATS-backed event plane from the dynamo-platform chart. Request/response
# traffic uses Dynamo's request plane default (TCP). The frontend runs
# KV-cache-aware routing; the local vLLM engine publishes KV events through
# ZMQ and the Dynamo worker runtime relays them onto the NATS event plane.
#
# Usage:
#   kubectl apply -f tests/manifests/dynamo-vllm-smoke-test.yaml -n dynamo-system
#   kubectl port-forward svc/vllm-smoke-test-frontend 8000:8000 -n dynamo-system
#   curl http://localhost:8000/v1/models
#   curl http://localhost:8000/v1/chat/completions \
#     -H "Content-Type: application/json" \
#     -d '{"model":"Qwen/Qwen3-0.6B","messages":[{"role":"user","content":"Hello!"}],"max_tokens":30,"stream":false}'

---
apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: vllm-smoke-test
spec:
  backendFramework: vllm
  components:
    - name: Frontend
      type: frontend
      replicas: 1
      podTemplate:
        spec:
          containers:
            - name: main
              image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.2.1
              env:
                - name: SERVED_MODEL_NAME
                  value: Qwen/Qwen3-0.6B
                - name: DYN_ROUTER_MODE
                  value: kv
    - name: VllmDecodeWorker
      type: worker
      replicas: 1
      sharedMemorySize: 2Gi
      podTemplate:
        spec:
          tolerations:
            - key: nvidia.com/gpu
              operator: Exists
              effect: NoSchedule
          containers:
            - name: main
              image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.2.1
              workingDir: /workspace/examples/backends/vllm
              command: ["python3", "-m", "dynamo.vllm"]
              args:
                - --model
                - Qwen/Qwen3-0.6B
                - --kv-events-config
                - '{"enable_kv_cache_events":true,"publisher":"zmq","endpoint":"tcp://*:5557"}'
              resources:
                limits:
                  nvidia.com/gpu: 1
