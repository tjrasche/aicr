#
# Dynamo vLLM inference workload for ai_service_metrics evidence collection.
# Deploys a DynamoGraphDeployment with vLLM backend (Qwen/Qwen3-0.6B).
# GPUs are requested as scalar nvidia.com/gpu limits — the device-plugin
# production default (#1327).
#
# Prerequisites:
#   - KAI Scheduler installed (provides default-parent-queue)
#   - Dynamo platform deployed (dynamo-platform with bundled CRDs)
#   - NVIDIA device plugin installed (nvidia.com/gpu resource)
#
# Usage:
#   kubectl apply -f dynamo-vllm-agg.yaml
#
# Cleanup:
#   kubectl delete ns dynamo-workload

---
apiVersion: scheduling.run.ai/v2
kind: Queue
metadata:
  name: dynamo
spec:
  parentQueue: default-parent-queue
  resources:
    gpu:
      limit: -1
      overQuotaWeight: 1
      quota: 0
    cpu:
      limit: -1
      overQuotaWeight: 1
      quota: 0
    memory:
      limit: -1
      overQuotaWeight: 1
      quota: 0

---
apiVersion: v1
kind: Namespace
metadata:
  name: dynamo-workload

---
apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: vllm-agg
  namespace: dynamo-workload
spec:
  backendFramework: vllm
  components:
    - name: Frontend
      type: frontend
      replicas: 1
      podTemplate:
        spec:
          nodeSelector:
            nodeGroup: cpu-worker
          tolerations:
            - key: dedicated
              operator: Equal
              value: worker-workload
              effect: NoSchedule
            - key: dedicated
              operator: Equal
              value: worker-workload
              effect: NoExecute
          containers:
            - name: main
              image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.2.1
              env:
                - name: SERVED_MODEL_NAME
                  value: Qwen/Qwen3-0.6B
                - name: DYN_ROUTER_MODE
                  value: kv
    - name: VllmDecodeWorker
      type: worker
      replicas: 1
      sharedMemorySize: 2Gi
      podTemplate:
        spec:
          nodeSelector:
            nodeGroup: gpu-worker
          tolerations:
            - key: dedicated
              operator: Equal
              value: worker-workload
              effect: NoSchedule
            - key: dedicated
              operator: Equal
              value: worker-workload
              effect: NoExecute
            - key: nvidia.com/gpu
              operator: Exists
              effect: NoSchedule
          containers:
            - name: main
              image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.2.1
              workingDir: /workspace/examples/backends/vllm
              command: ["python3", "-m", "dynamo.vllm"]
              args:
                - --model
                - Qwen/Qwen3-0.6B
                - --kv-events-config
                - '{"enable_kv_cache_events":true,"publisher":"zmq","endpoint":"tcp://*:5557"}'
              resources:
                limits:
                  nvidia.com/gpu: 1
