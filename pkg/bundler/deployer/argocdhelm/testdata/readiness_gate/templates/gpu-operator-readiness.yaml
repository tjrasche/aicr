{{- $childName := printf "%s%s" ((.Values.deployer | default dict).namePrefix | default "") "gpu-operator-readiness" -}}
{{- if gt (len $childName) 53 }}{{ fail (printf "deployer.namePrefix produces child Application name %q (%d chars): child Application names are capped at 53 characters because Argo CD derives the Helm release name from the Application name for Helm-rendered children" $childName (len $childName)) }}{{ end -}}
{{- if eq $childName (.Values.appName | default "aicr-stack" | toString) }}{{ fail (printf "child Application name %q collides with the parent Application name: choose a different deployer.namePrefix or appName" $childName) }}{{ end -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    annotations:
        argocd.argoproj.io/sync-wave: "3"
    name: '{{ (.Values.deployer | default dict).namePrefix | default "" }}gpu-operator-readiness'
    namespace: argocd
spec:
    destination:
        namespace: gpu-operator
        server: '{{ (.Values.deployer | default dict).destinationServer | default "https://kubernetes.default.svc" }}'
    project: '{{ (.Values.deployer | default dict).project | default "default" }}'
    source:
        helm:
            values: |-
                {{- $dynamic := index .Values "gpuoperator" | default dict -}}
                {{- toYaml $dynamic | nindent 16 }}
        path: 002-gpu-operator-readiness
        repoURL: '{{ required "repoURL is required: pass --set repoURL=<parent namespace> (e.g., oci://<registry>/<path>) — do NOT include the chart name; this template appends .Chart.Name to assemble the full OCI artifact reference" .Values.repoURL | trimSuffix "/" }}/{{ .Chart.Name }}'
        targetRevision: '{{ .Values.targetRevision | default .Chart.Version }}'
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true
