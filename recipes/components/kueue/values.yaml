# Kueue Helm values
# Kubernetes-native job queueing system with quota management,
# fair sharing, priority-based preemption, and multi-tenancy support.
#
# Upstream chart defaults are sufficient for resource requests/limits
# and security context (runAsNonRoot, readOnlyRootFilesystem,
# drop ALL capabilities, seccomp RuntimeDefault).

controllerManager:
  tolerations:
    - operator: Exists

# Pinned copy of the chart 0.18.2 default controllerManagerConfigYaml with
# ONE deliberate change: integrations.frameworks is trimmed to the
# frameworks AICR manages (batch/job, JobSet, TrainJob). The chart default
# also enables pod/deployment/statefulset/ray/kubeflow-v1/leaderworkerset
# integrations — webhook interception surface we do not ship by default.
# MAINTENANCE: this is a string blob (Helm does not merge it). On every
# chart version bump, re-diff against
#   helm show values oci://registry.k8s.io/kueue/charts/kueue --version <new>
# and re-apply the frameworks trim.
managerConfig:
  controllerManagerConfigYaml: |-
    apiVersion: config.kueue.x-k8s.io/v1beta2
    kind: Configuration
    health:
      healthProbeBindAddress: :8081
    metrics:
      bindAddress: :8443
    # enableClusterQueueResources: true
    webhook:
      port: 9443
    leaderElection:
      leaderElect: true
      resourceName: c1f6bfd2.kueue.x-k8s.io
    controller:
      groupKindConcurrency:
        Job.batch: 5
        Pod: 5
        Workload.kueue.x-k8s.io: 5
        LocalQueue.kueue.x-k8s.io: 1
        ClusterQueue.kueue.x-k8s.io: 1
        ResourceFlavor.kueue.x-k8s.io: 1
    clientConnection:
      qps: 50
      burst: 100
    #pprofBindAddress: :8083
    #waitForPodsReady:
    #  timeout: 5m
    #  recoveryTimeout: 3m
    #  blockAdmission: false
    #  requeuingStrategy:
    #    timestamp: Eviction
    #    backoffLimitCount: null # null indicates infinite requeuing
    #    backoffBaseSeconds: 60
    #    backoffMaxSeconds: 3600
    #manageJobsWithoutQueueName: true
    # See "Opt-in Namespace Management" for guidance on namespace management:
    # https://kueue.sigs.k8s.io/docs/tasks/manage/enforce_job_management/opt_in_namespace_management/
    #managedJobsNamespaceSelector:
    #  matchExpressions:
    #    - key: kubernetes.io/metadata.name
    #      operator: NotIn
    #      values: [ kube-system, kueue-system ]
    #internalCertManagement:
    #  enable: false
    #  webhookServiceName: ""
    #  webhookSecretName: ""
    integrations:
      frameworks:
      - "batch/job"
      - "jobset.x-k8s.io/jobset"
      - "trainer.kubeflow.org/trainjob"
    #  externalFrameworks:
    #  - "Foo.v1.example.com"
    #fairSharing:
    #  preemptionStrategies: [LessThanOrEqualToFinalShare, LessThanInitialShare]
    #admissionFairSharing:
    #  usageHalfLifeTime: "168h" # 7 days
    #  usageSamplingInterval: "5m"
    #  resourceWeights: # optional, defaults to 1 for all resources if not specified
    #    cpu: 0    # if you want to completely ignore cpu usage
    #    memory: 0 # ignore completely memory usage
    #    example.com/gpu: 100 # and you care only about GPUs usage
    #resources:
    #  excludeResourcePrefixes: []
    #  quotaCheckStrategy: "BlockUndeclared"
    # transformations:
    # - input: nvidia.com/mig-4g.5gb
    #   strategy: Replace | Retain
    #   outputs:
    #     example.com/accelerator-memory: 5Gi
    #     example.com/accelerator-gpc: 4
    #objectRetentionPolicies:
