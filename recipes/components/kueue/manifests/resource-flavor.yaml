# Default ResourceFlavor for the AICR kueue component.
# No nodeLabels: stays valid on heterogeneous clusters. The toleration is
# REQUIRED for GPU workloads — Kueue injects flavor tolerations into
# admitted workloads, and topology-aware scheduling does not see
# webhook-injected tolerations (e.g. from the GPU Operator).
#
# TRADE-OFF: as the single default flavor, this toleration is injected
# into EVERY admitted workload — including CPU-only jobs, which can then
# schedule onto nvidia.com/gpu-tainted nodes (the taint no longer repels
# them). Admission-neutral by design; operators tuning quotas for
# CPU-only queues should add a separate flavor without this toleration.
apiVersion: kueue.x-k8s.io/v1beta2
kind: ResourceFlavor
metadata:
  name: default-flavor
  annotations:
    # kueue.x-k8s.io is a custom (CRD-backed) apiVersion — required by
    # TestManifestHelmHooksRequired so this CR is applied post-install,
    # after kueue's own chart has installed the ResourceFlavor CRD.
    # Weight 1: no dependency on the other two kueue manifests here, but
    # ClusterQueue references this flavor by name, so it applies first.
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
