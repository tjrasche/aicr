# Default LocalQueue for the AICR kueue component: least-surprise submit
# target. Workloads opt in with the label
# kueue.x-k8s.io/queue-name: default (in the default namespace).
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  name: default
  namespace: default
  annotations:
    # Post-install hook required for custom apiVersions (see resource-flavor
    # .yaml). Weight 10: applied last, after cluster-queue (weight 5), which
    # this LocalQueue's spec.clusterQueue references by name.
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  clusterQueue: cluster-queue
