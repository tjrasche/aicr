# Slinky Slurm Operator Helm values (chart v1.2.0)
# Deploys the SchedMD Slinky Slurm operator and its admission webhook into
# the `slinky` namespace. Manages the lifecycle of Slurm clusters declared
# via the Controller / NodeSet / LoginSet / Accounting / RestApi / Token
# CRDs installed by the slinky-slurm-operator-crds component.
#
# The operator depends on cert-manager for serving the admission webhook
# certificate (Issuer + Certificate resources are rendered by the chart).
# AICR injects system node selectors and tolerations into both the operator
# and webhook through recipes/registry.yaml. Affinity remains a chart-specific
# override through valuesFile, --set-json, or --dynamic.

# CRDs are managed by the separate slinky-slurm-operator-crds component
# to keep CRD lifecycle independent from operator upgrades.
crds:
  enabled: false

# Use cert-manager to issue the webhook serving certificate. This matches
# the chart default and is stated explicitly so the dependency on the
# cert-manager component is obvious from the values file.
certManager:
  enabled: true
