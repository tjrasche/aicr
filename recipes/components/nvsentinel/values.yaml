# NVSentinel Helm values
# Base configuration for all deployments

# Override release name prefix to avoid aicr-stack- prefix in resource names
fullnameOverride: nvsentinel

global:
  # Tolerate all taints so GPU-node daemonsets (platform-connectors,
  # gpu-health-monitor, syslog-health-monitor, metadata-collector) can
  # schedule on nodes with NoSchedule/NoExecute taints set by ASG.
  # Matches internal platform template behavior.
  # TODO: remove once upstream NVSentinel chart defaults to this
  # (see https://github.com/NVIDIA/NVSentinel/pull/1004)
  tolerations:
    - operator: Exists

networkPolicy:
  enabled: false

platformConnector:

  resources:
    limits:
      cpu: 200m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 512Mi

  updateStrategy: RollingUpdate
  maxUnavailable: 1

# Use the generic (privileged-Job) reboot provider so users don't need
# cloud IAM permissions. When faultRemediation/janitor are enabled, the
# janitor-provider spawns a privileged Job that runs chroot /host /sbin/reboot
# on the target node (ADR-028: generic bare-metal reboot provider).
janitor-provider:
  csp:
    provider: generic
