# GPU Operator Helm values
# AKS Training configuration overrides

cdi:
  enabled: true
  default: false

# Network Operator supplies MOFED through its OFED driver container
# (doca-driver, see network-operator/manifests/nic-cluster-policy-aks.yaml).
# Although that container loads modules into the host kernel, this is NOT
# host-preinstalled MOFED — useHostMofed describes how MOFED is installed
# and coordinated, not where its modules execute. Keep useHostMofed false
# so the GPU Operator driver container builds nvidia_peermem against the
# containerized MOFED stack; true can cause an ib_core symbol mismatch
# (modprobe nvidia-peermem: Invalid argument, observed on aicr-test1).
# This stays false regardless of driver ownership mode: with
# driver.enabled=false it is inert, but the correct value prevents a
# future ownership-mode change from reviving the bug.
driver:
  rdma:
    enabled: true
    useHostMofed: false

validator:
  plugin:
    env:
      - name: WITH_WORKLOAD
        value: "false"

# AKS Ubuntu 24.04 GPU nodes run containerd 2.x (2.3 on current node
# images) with a version=2 root config at /etc/containerd/config.toml. The container-toolkit's default
# config source ("command" = `containerd config dump`) returns the
# MIGRATED effective config (version=4), so the generated
# /etc/containerd/conf.d/99-nvidia.toml declares a higher version than
# the root file and containerd refuses to start ("drop-in config
# version 4 higher than root config version 2"), taking the node
# NotReady. Reading the on-disk file instead emits a matching
# version=2 drop-in. See issue #1688.
toolkit:
  env:
    - name: RUNTIME_CONFIG_SOURCE
      value: file
